<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f7f2e9" media="(prefers-color-scheme: light)" />
  <meta name="description" content="Tally — a calm little app for your monthly payments" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Manifest + icons -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <title>Tally</title>

  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0b1020;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    #root { min-height: 100vh; min-height: 100dvh; }
    input, textarea, button, select { font-family: inherit; }
    /* Pre-splash — shown until React mounts */
    .tally-splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0b1020; color: #8ab0ff;
      font-family: Georgia, serif; font-style: italic; font-size: 48px;
      letter-spacing: -0.02em;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="tally-splash">Tally</div>
  </div>

  <!-- React (production) + Babel standalone -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
  const { useState, useEffect, useRef } = React;


// ============================================================
// THEMES — soft, considered palettes. No harsh reds/greens.
// ============================================================
const THEMES = {
  midnight: {
    name: 'Midnight',
    bg: '#0b1020', surface: '#141a2e', surfaceElevated: '#1c2340',
    text: '#e8ebf3', textMuted: '#8b94ad', textFaint: '#565e77',
    accent: '#8ab0ff', accentSoft: 'rgba(138,176,255,0.12)',
    border: '#1f2740', divider: 'rgba(255,255,255,0.06)',
    green: '#7dd3a8', amber: '#f0c674', red: '#e89b8a',
    greenSoft: 'rgba(125,211,168,0.12)', amberSoft: 'rgba(240,198,116,0.14)', redSoft: 'rgba(232,155,138,0.14)',
    shadow: '0 10px 40px rgba(0,0,0,0.35)'
  },
  paper: {
    name: 'Paper',
    bg: '#f7f2e9', surface: '#fffdf8', surfaceElevated: '#ffffff',
    text: '#2e2920', textMuted: '#887f6e', textFaint: '#b9b0a0',
    accent: '#7a6f5d', accentSoft: 'rgba(122,111,93,0.10)',
    border: '#ebe3d0', divider: 'rgba(120,100,70,0.08)',
    green: '#7fa26a', amber: '#c99a4d', red: '#b86b56',
    greenSoft: 'rgba(127,162,106,0.14)', amberSoft: 'rgba(201,154,77,0.14)', redSoft: 'rgba(184,107,86,0.14)',
    shadow: '0 8px 28px rgba(120,100,70,0.08)'
  },
  forest: {
    name: 'Forest',
    bg: '#0f1a15', surface: '#182821', surfaceElevated: '#1f3329',
    text: '#e4ebe2', textMuted: '#92a18e', textFaint: '#566856',
    accent: '#9cc296', accentSoft: 'rgba(156,194,150,0.12)',
    border: '#243a2d', divider: 'rgba(255,255,255,0.05)',
    green: '#a8d19f', amber: '#d4bc7a', red: '#c99080',
    greenSoft: 'rgba(168,209,159,0.14)', amberSoft: 'rgba(212,188,122,0.14)', redSoft: 'rgba(201,144,128,0.14)',
    shadow: '0 10px 40px rgba(0,0,0,0.35)'
  },
  sunset: {
    name: 'Sunset',
    bg: '#fcf0e4', surface: '#fffaf4', surfaceElevated: '#ffffff',
    text: '#3d2817', textMuted: '#a07f5e', textFaint: '#cbb49b',
    accent: '#d9744e', accentSoft: 'rgba(217,116,78,0.10)',
    border: '#f1ddc5', divider: 'rgba(200,120,80,0.08)',
    green: '#8faf7d', amber: '#d99848', red: '#c96a53',
    greenSoft: 'rgba(143,175,125,0.14)', amberSoft: 'rgba(217,152,72,0.14)', redSoft: 'rgba(201,106,83,0.14)',
    shadow: '0 8px 28px rgba(200,120,80,0.10)'
  },
  mono: {
    name: 'Mono',
    bg: '#fafafa', surface: '#ffffff', surfaceElevated: '#ffffff',
    text: '#0a0a0a', textMuted: '#707070', textFaint: '#b0b0b0',
    accent: '#0a0a0a', accentSoft: 'rgba(10,10,10,0.06)',
    border: '#e8e8e8', divider: 'rgba(0,0,0,0.06)',
    green: '#2a2a2a', amber: '#707070', red: '#0a0a0a',
    greenSoft: 'rgba(0,0,0,0.04)', amberSoft: 'rgba(0,0,0,0.06)', redSoft: 'rgba(0,0,0,0.08)',
    shadow: '0 6px 24px rgba(0,0,0,0.05)'
  }
};

// ============================================================
// POT COLOURS — soft, cohesive palette auto-assigned to new pots
// ============================================================
const POT_COLORS = [
  { id: 'blue',     hex: '#8ab0ff', soft: 'rgba(138,176,255,0.14)' },
  { id: 'sage',     hex: '#9bc49a', soft: 'rgba(155,196,154,0.16)' },
  { id: 'coral',    hex: '#e5a78d', soft: 'rgba(229,167,141,0.16)' },
  { id: 'amber',    hex: '#e5c48a', soft: 'rgba(229,196,138,0.18)' },
  { id: 'lavender', hex: '#b5a5d4', soft: 'rgba(181,165,212,0.16)' },
  { id: 'teal',     hex: '#8ab5b0', soft: 'rgba(138,181,176,0.16)' }
];

const getPotColor = (colorId) => POT_COLORS.find(c => c.id === colorId) || POT_COLORS[0];
const getPotById = (pots, id) => pots.find(p => p.id === id);
const nextPotColor = (pots) => POT_COLORS[pots.length % POT_COLORS.length].id;

// ============================================================
// STORAGE — window.storage (artifact) with localStorage fallback
// ============================================================
const storage = {
  async get(key) {
    try {
      if (typeof window !== 'undefined' && window.storage && window.storage.get) {
        const r = await window.storage.get(key);
        return r && r.value ? r.value : null;
      }
    } catch (e) {}
    try { return typeof localStorage !== 'undefined' ? localStorage.getItem(key) : null; } catch { return null; }
  },
  async set(key, value) {
    try {
      if (typeof window !== 'undefined' && window.storage && window.storage.set) {
        await window.storage.set(key, value);
        return;
      }
    } catch (e) {}
    try { if (typeof localStorage !== 'undefined') localStorage.setItem(key, value); } catch {}
  }
};

// ============================================================
// DATE HELPERS
// ============================================================
const toISO = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};
const todayISO = () => toISO(new Date());

// ============================================================
// UK BANK HOLIDAYS — England & Wales, 2025–2028
// Source: gov.uk/bank-holidays. Substitute days already baked in
// (e.g. 2026 Boxing Day → Mon 28 Dec since 26 Dec is a Saturday).
// ============================================================
const BANK_HOLIDAYS = new Set([
  // 2025
  '2025-01-01', '2025-04-18', '2025-04-21', '2025-05-05',
  '2025-05-26', '2025-08-25', '2025-12-25', '2025-12-26',
  // 2026
  '2026-01-01', '2026-04-03', '2026-04-06', '2026-05-04',
  '2026-05-25', '2026-08-31', '2026-12-25', '2026-12-28',
  // 2027
  '2027-01-01', '2027-03-26', '2027-03-29', '2027-05-03',
  '2027-05-31', '2027-08-30', '2027-12-27', '2027-12-28',
  // 2028
  '2028-01-03', '2028-04-14', '2028-04-17', '2028-05-01',
  '2028-05-29', '2028-08-28', '2028-12-25', '2028-12-26'
]);

const isWorkingDay = (iso) => {
  if (!iso) return true;
  const d = new Date(iso + 'T00:00:00');
  const dow = d.getDay(); // 0 Sun, 6 Sat
  if (dow === 0 || dow === 6) return false;
  if (BANK_HOLIDAYS.has(iso)) return false;
  return true;
};

// Shift forward to the next working day if the given date falls on a
// weekend or bank holiday. Returns the input unchanged if already fine.
const adjustToWorkingDay = (iso) => {
  if (!iso) return iso;
  let d = new Date(iso + 'T00:00:00');
  for (let i = 0; i < 10; i++) {
    const candidate = toISO(d);
    if (isWorkingDay(candidate)) return candidate;
    d.setDate(d.getDate() + 1);
  }
  return iso;
};

const daysUntil = (iso) => {
  if (!iso) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(iso + 'T00:00:00');
  return Math.round((d - t) / 86400000);
};

const getStatus = (payment) => {
  if (payment.paid) return 'paid';
  const days = daysUntil(payment.dueDate);
  if (days === null) return 'upcoming';
  if (days < 0) return 'overdue';
  if (days <= 3) return 'soon';
  return 'upcoming';
};

const nextDueDate = (currentISO, recurrence, customDay, skipNonWorking = true) => {
  const d = new Date(currentISO + 'T00:00:00');
  switch (recurrence) {
    case 'weekly': d.setDate(d.getDate() + 7); break;
    case 'fortnightly': d.setDate(d.getDate() + 14); break;
    case 'four-weekly': d.setDate(d.getDate() + 28); break;
    case 'monthly': d.setMonth(d.getMonth() + 1); break;
    case 'quarterly': d.setMonth(d.getMonth() + 3); break;
    case 'yearly': d.setFullYear(d.getFullYear() + 1); break;
    case 'custom': {
      d.setMonth(d.getMonth() + 1);
      if (customDay) {
        const last = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
        d.setDate(Math.min(customDay, last));
      }
      break;
    }
    default: return null;
  }
  const iso = toISO(d);
  return skipNonWorking ? adjustToWorkingDay(iso) : iso;
};

const friendlyDate = (iso) => {
  if (!iso) return '';
  const days = daysUntil(iso);
  if (days === 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  if (days === -1) return 'Yesterday';
  if (days < 0) return `${Math.abs(days)} days ago`;
  if (days <= 7) return `In ${days} days`;
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
};

const RECURRENCE_OPTIONS = [
  { value: 'one-off', label: 'One-off' },
  { value: 'weekly', label: 'Weekly' },
  { value: 'fortnightly', label: 'Fortnightly' },
  { value: 'four-weekly', label: 'Every 4 weeks' },
  { value: 'monthly', label: 'Monthly' },
  { value: 'quarterly', label: 'Quarterly' },
  { value: 'yearly', label: 'Yearly' },
  { value: 'custom', label: 'Specific day each month' }
];

const recurrenceLabel = (p) => {
  const opt = RECURRENCE_OPTIONS.find(o => o.value === p.recurrence);
  if (!opt) return '';
  if (p.recurrence === 'custom' && p.customDay) return `Day ${p.customDay} each month`;
  return opt.label;
};

const CURRENCIES = { GBP: '£', USD: '$', EUR: '€', AUD: 'A$', CAD: 'C$', JPY: '¥' };
const fmtMoney = (amount, symbol) => {
  const n = Number(amount) || 0;
  return `${symbol}${n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

// ============================================================
// MAIN COMPONENT
// ============================================================
function Tally() {
  const [payments, setPayments] = useState([]);
  const [pots, setPots] = useState([]);
  const [filter, setFilter] = useState('all'); // all | recurring | one-off
  const [themeName, setThemeName] = useState('midnight');
  const [currency, setCurrency] = useState('GBP');
  const [skipNonWorking, setSkipNonWorking] = useState(true);
  const [potsEnabled, setPotsEnabled] = useState(false);
  const [modal, setModal] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [newPotForPayment, setNewPotForPayment] = useState(null); // truthy when creating a new pot
  const [transactionForPot, setTransactionForPot] = useState(null); // { potId, direction: 'in'|'out' }
  const [resetForPot, setResetForPot] = useState(null); // pot id awaiting reset confirmation
  const [rolloverSnapshot, setRolloverSnapshot] = useState(null);
  const [loaded, setLoaded] = useState(false);

  // Load
  useEffect(() => {
    (async () => {
      try {
        const p = await storage.get('tally-payments');
        const pts = await storage.get('tally-pots');
        const t = await storage.get('tally-theme');
        const c = await storage.get('tally-currency');
        const s = await storage.get('tally-skip-non-working');
        const pe = await storage.get('tally-pots-enabled');
        if (p) {
          try {
            const parsed = JSON.parse(p);
            // Migrate: strip legacy pot-coupling fields so payments are just payments
            const migrated = parsed.map(pay => {
              const { potId, topupPotId, type, ...rest } = pay;
              return rest;
            });
            setPayments(migrated);
          } catch {}
        }
        if (pts) {
          try {
            const parsed = JSON.parse(pts);
            // Migrate: ensure every pot has a balance + transactions array
            const migrated = parsed.map(pot => ({
              ...pot,
              balance: typeof pot.balance === 'number' ? pot.balance : 0,
              transactions: Array.isArray(pot.transactions) ? pot.transactions : []
            }));
            setPots(migrated);
          } catch {}
        }
        if (t && THEMES[t]) setThemeName(t);
        if (c && CURRENCIES[c]) setCurrency(c);
        if (s !== null && s !== undefined) setSkipNonWorking(s === 'true' || s === true);
        if (pe !== null && pe !== undefined) setPotsEnabled(pe === 'true' || pe === true);
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  // Save
  useEffect(() => { if (loaded) storage.set('tally-payments', JSON.stringify(payments)); }, [payments, loaded]);
  useEffect(() => { if (loaded) storage.set('tally-pots', JSON.stringify(pots)); }, [pots, loaded]);
  useEffect(() => { if (loaded) storage.set('tally-theme', themeName); }, [themeName, loaded]);
  useEffect(() => { if (loaded) storage.set('tally-currency', currency); }, [currency, loaded]);
  useEffect(() => { if (loaded) storage.set('tally-skip-non-working', String(skipNonWorking)); }, [skipNonWorking, loaded]);
  useEffect(() => { if (loaded) storage.set('tally-pots-enabled', String(potsEnabled)); }, [potsEnabled, loaded]);

  // Inject fonts once
  useEffect(() => {
    const id = 'tally-fonts';
    if (document.getElementById(id)) return;
    const link = document.createElement('link');
    link.id = id;
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap';
    document.head.appendChild(link);
  }, []);

  const theme = THEMES[themeName];
  const cur = CURRENCIES[currency];

  // Derived — Pots tab shows pot cards (not payments), so just filter by recurrence for other tabs
  const filtered = payments.filter(p => {
    if (filter === 'pots') return false; // Pots tab renders pots, not payments
    if (filter === 'recurring') return p.recurrence !== 'one-off';
    if (filter === 'one-off') return p.recurrence === 'one-off';
    return true;
  });

  // Safety: if user disables pots while on the Pots tab, bounce to All
  useEffect(() => {
    if (!potsEnabled && filter === 'pots') setFilter('all');
  }, [potsEnabled, filter]);

  const totalLeft = filtered.filter(p => !p.paid).reduce((s, p) => s + Number(p.amount || 0), 0);
  const totalPaid = filtered.filter(p => p.paid).reduce((s, p) => s + Number(p.amount || 0), 0);
  const totalAll = totalLeft + totalPaid;
  const progressPct = totalAll > 0 ? (totalPaid / totalAll) * 100 : 0;
  const paidCount = filtered.filter(p => p.paid).length;
  const allPaid = filtered.length > 0 && paidCount === filtered.length;

  // Grouped
  const overdue = filtered.filter(p => !p.paid && getStatus(p) === 'overdue').sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const soon = filtered.filter(p => !p.paid && getStatus(p) === 'soon').sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const upcoming = filtered.filter(p => !p.paid && getStatus(p) === 'upcoming').sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const paid = filtered.filter(p => p.paid).sort((a,b) => (b.paidDate || '').localeCompare(a.paidDate || ''));

  // Actions — payments
  const togglePaid = (id) => {
    setPayments(ps => ps.map(p => p.id === id
      ? { ...p, paid: !p.paid, paidDate: !p.paid ? todayISO() : undefined }
      : p
    ));
  };

  const deletePayment = (id) => {
    setPayments(ps => ps.filter(p => p.id !== id));
  };

  // Actions — pots (self-contained savings ledgers)
  const createPot = (name) => {
    const trimmed = name.trim();
    if (!trimmed) return null;
    const newPot = {
      id: `pot_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
      name: trimmed,
      color: nextPotColor(pots),
      balance: 0,
      transactions: [],
      createdAt: todayISO()
    };
    setPots(ps => [...ps, newPot]);
    return newPot;
  };

  const renamePot = (potId, name) => {
    const trimmed = name.trim();
    if (!trimmed) return;
    setPots(ps => ps.map(p => p.id === potId ? { ...p, name: trimmed } : p));
  };

  const deletePot = (potId) => {
    setPots(ps => ps.filter(p => p.id !== potId));
  };

  // Add or take out — amount is signed (+ in, − out)
  const addPotTransaction = (potId, amount, note) => {
    const n = Number(amount);
    if (!n || isNaN(n)) return;
    setPots(ps => ps.map(p => {
      if (p.id !== potId) return p;
      const tx = {
        id: `tx_${Date.now()}_${Math.random().toString(36).slice(2,5)}`,
        amount: n,
        note: (note || '').trim(),
        date: todayISO()
      };
      return {
        ...p,
        balance: Number(((p.balance || 0) + n).toFixed(2)),
        transactions: [tx, ...(p.transactions || [])]
      };
    }));
  };

  // Remove a single transaction (and update balance)
  const deletePotTransaction = (potId, txId) => {
    setPots(ps => ps.map(p => {
      if (p.id !== potId) return p;
      const tx = (p.transactions || []).find(t => t.id === txId);
      if (!tx) return p;
      return {
        ...p,
        balance: Number(((p.balance || 0) - tx.amount).toFixed(2)),
        transactions: p.transactions.filter(t => t.id !== txId)
      };
    }));
  };

  // Reset pot: clear log + balance, keep the pot
  const resetPot = (potId) => {
    setPots(ps => ps.map(p => p.id === potId
      ? { ...p, balance: 0, transactions: [] }
      : p
    ));
  };

  const handleNewPotSubmit = (name) => {
    createPot(name);
    setNewPotForPayment(null);
  };

  const savePayment = (data) => {
    if (editingId) {
      setPayments(ps => ps.map(p => p.id === editingId ? { ...p, ...data } : p));
    } else {
      const newP = {
        id: `p_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        name: data.name,
        amount: Number(data.amount) || 0,
        dueDate: data.dueDate,
        recurrence: data.recurrence,
        customDay: data.customDay,
        notes: data.notes || '',
        paid: false,
        createdAt: todayISO()
      };
      setPayments(ps => [...ps, newP]);
    }
    setModal(null);
    setEditingId(null);
  };

  const openEdit = (p) => {
    setEditingId(p.id);
    setModal('edit');
  };

  const requestReset = () => {
    const paidList = payments.filter(p => p.paid);
    setRolloverSnapshot({
      count: paidList.length,
      total: paidList.reduce((s,p) => s + Number(p.amount || 0), 0)
    });
    setModal('reset');
  };

  const confirmReset = () => {
    setPayments(ps => {
      const kept = [];
      for (const p of ps) {
        if (!p.paid) { kept.push(p); continue; }
        if (p.recurrence === 'one-off') continue; // drop
        const next = nextDueDate(p.dueDate, p.recurrence, p.customDay, skipNonWorking);
        kept.push({ ...p, paid: false, paidDate: undefined, dueDate: next || p.dueDate });
      }
      return kept;
    });
    setModal('summary');
  };

  // Render
  const editingPayment = editingId ? payments.find(p => p.id === editingId) : null;

  return (
    <div style={{
      minHeight: '100dvh',
      background: theme.bg,
      color: theme.text,
      fontFamily: "'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
      transition: 'background 0.4s ease, color 0.4s ease',
      paddingBottom: 'calc(120px + env(safe-area-inset-bottom))',
      WebkitFontSmoothing: 'antialiased',
      MozOsxFontSmoothing: 'grayscale'
    }}>
      <div style={{ maxWidth: 520, margin: '0 auto', padding: '24px 20px 0' }}>

        {/* Header */}
        <header style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }}>
          <h1 style={{
            fontFamily: "'Fraunces', Georgia, serif",
            fontWeight: 400,
            fontSize: 32,
            letterSpacing: '-0.02em',
            margin: 0,
            fontStyle: 'italic'
          }}>Tally</h1>
          <button onClick={() => setModal('settings')} aria-label="Settings" style={iconBtn(theme)}>
            <SettingsIcon />
          </button>
        </header>

        {/* Hero */}
        <Hero
          theme={theme}
          totalLeft={totalLeft}
          totalPaid={totalPaid}
          progressPct={progressPct}
          paidCount={paidCount}
          totalCount={filtered.length}
          allPaid={allPaid}
          pots={pots}
          filter={filter}
          cur={cur}
        />

        {/* Filter tabs */}
        <FilterTabs theme={theme} value={filter} onChange={setFilter} showPots={potsEnabled} />

        {/* Pots tab — dedicated ledger view */}
        {filter === 'pots' ? (
          pots.length === 0 ? (
            <div style={{
              padding: '56px 24px', textAlign: 'center',
              background: theme.surface, border: `1px solid ${theme.border}`,
              borderRadius: 24, marginTop: 8
            }}>
              <div style={{
                fontFamily: "'Fraunces', serif", fontStyle: 'italic',
                fontSize: 22, color: theme.text, marginBottom: 6
              }}>No pots yet.</div>
              <div style={{ fontSize: 14, color: theme.textMuted, lineHeight: 1.5, marginBottom: 20 }}>
                Pots are little savings ledgers. Create one and add money in or take money out whenever you need.
              </div>
              <button onClick={() => setNewPotForPayment('standalone')} style={{
                padding: '11px 22px', background: theme.accent, color: theme.bg,
                border: 'none', borderRadius: 12,
                fontSize: 14, fontWeight: 600, fontFamily: 'inherit',
                cursor: 'pointer', letterSpacing: '0.01em'
              }}>Create your first pot</button>
            </div>
          ) : (
            <div style={{ marginTop: 8, display: 'flex', flexDirection: 'column', gap: 16 }}>
              {pots.map(pot => (
                <PotLedger
                  key={pot.id}
                  pot={pot}
                  theme={theme}
                  cur={cur}
                  onRename={(newName) => renamePot(pot.id, newName)}
                  onDelete={() => deletePot(pot.id)}
                  onReset={() => setResetForPot(pot.id)}
                  onAdd={() => setTransactionForPot({ potId: pot.id, direction: 'in' })}
                  onRemove={() => setTransactionForPot({ potId: pot.id, direction: 'out' })}
                  onDeleteTx={(txId) => deletePotTransaction(pot.id, txId)}
                />
              ))}
              <button onClick={() => setNewPotForPayment('standalone')} style={{
                marginTop: 4, padding: '14px 16px',
                background: 'transparent', border: `1px dashed ${theme.border}`,
                borderRadius: 14, fontSize: 14, color: theme.textMuted,
                fontFamily: 'inherit', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
              }}>
                <span style={{
                  width: 16, height: 16, borderRadius: 8, border: `1.5px dashed ${theme.textFaint}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: theme.textMuted, fontSize: 14, lineHeight: 1
                }}>+</span>
                New pot
              </button>
            </div>
          )
        ) : (
          /* All / Recurring / One-off view */
          filtered.length === 0 ? (
            <EmptyState theme={theme} onAdd={() => setModal('add')} filter={filter} />
          ) : (
            <div style={{ marginTop: 8 }}>
              {overdue.length > 0 && (
                <Section theme={theme} label="Overdue" accent={theme.red}>
                  {overdue.map(p => <PaymentRow key={p.id} p={p} theme={theme} cur={cur}
                    onToggle={() => togglePaid(p.id)} onEdit={() => openEdit(p)} onDelete={() => deletePayment(p.id)} />)}
                </Section>
              )}
              {soon.length > 0 && (
                <Section theme={theme} label="Due soon" accent={theme.amber}>
                  {soon.map(p => <PaymentRow key={p.id} p={p} theme={theme} cur={cur}
                    onToggle={() => togglePaid(p.id)} onEdit={() => openEdit(p)} onDelete={() => deletePayment(p.id)} />)}
                </Section>
              )}
              {upcoming.length > 0 && (
                <Section theme={theme} label="Upcoming" accent={theme.textMuted}>
                  {upcoming.map(p => <PaymentRow key={p.id} p={p} theme={theme} cur={cur}
                    onToggle={() => togglePaid(p.id)} onEdit={() => openEdit(p)} onDelete={() => deletePayment(p.id)} />)}
                </Section>
              )}
              {paid.length > 0 && (
                <Section theme={theme} label="Paid" accent={theme.green}>
                  {paid.map(p => <PaymentRow key={p.id} p={p} theme={theme} cur={cur}
                    onToggle={() => togglePaid(p.id)} onEdit={() => openEdit(p)} onDelete={() => deletePayment(p.id)} />)}
                </Section>
              )}

              {allPaid && (
              <div style={{
                marginTop: 24, padding: '20px 22px', borderRadius: 20,
                background: theme.greenSoft, border: `1px solid ${theme.border}`,
                textAlign: 'center'
              }}>
                <div style={{
                  fontFamily: "'Fraunces', serif", fontStyle: 'italic', fontSize: 22,
                  color: theme.text, marginBottom: 4
                }}>All sorted.</div>
                <div style={{ fontSize: 14, color: theme.textMuted }}>Nice one. Roll over when you're ready.</div>
              </div>
            )}

            {payments.some(p => p.paid) && (
              <button onClick={requestReset} style={{
                marginTop: 24, width: '100%', padding: '14px 18px',
                background: 'transparent', color: theme.textMuted,
                border: `1px solid ${theme.border}`, borderRadius: 14,
                fontSize: 14, fontWeight: 500, fontFamily: 'inherit',
                cursor: 'pointer', letterSpacing: '0.01em'
              }}>Roll over to next month</button>
            )}
          </div>
          )
        )}
      </div>

      {/* FAB */}
      <button onClick={() => setModal('add')} aria-label="Add payment" style={{
        position: 'fixed',
        bottom: 'max(40px, calc(env(safe-area-inset-bottom) + 32px))',
        right: 'max(20px, calc(50% - 240px))',
        zIndex: 10,
        width: 60, height: 60, borderRadius: 30,
        background: theme.accent, color: theme.bg, border: 'none',
        boxShadow: theme.shadow, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 28, fontWeight: 300, lineHeight: 1,
        transition: 'transform 0.2s ease, box-shadow 0.2s ease'
      }}
      onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.05)'}
      onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
        <PlusIcon />
      </button>

      {/* Modals */}
      {(modal === 'add' || modal === 'edit') && (
        <PaymentModal
          theme={theme}
          cur={cur}
          editing={editingPayment}
          skipNonWorking={skipNonWorking}
          onCancel={() => { setModal(null); setEditingId(null); }}
          onSave={savePayment}
          onDelete={editingPayment ? () => { deletePayment(editingPayment.id); setModal(null); setEditingId(null); } : null}
        />
      )}

      {modal === 'settings' && (
        <SettingsModal
          theme={theme}
          themeName={themeName}
          onSelectTheme={setThemeName}
          currency={currency}
          onSelectCurrency={setCurrency}
          skipNonWorking={skipNonWorking}
          onToggleSkipNonWorking={setSkipNonWorking}
          potsEnabled={potsEnabled}
          onTogglePotsEnabled={setPotsEnabled}
          pots={pots}
          cur={cur}
          onRenamePot={renamePot}
          onDeletePot={deletePot}
          onClose={() => setModal(null)}
        />
      )}

      {newPotForPayment && (
        <NewPotModal
          theme={theme}
          nextColor={getPotColor(nextPotColor(pots))}
          onCancel={() => setNewPotForPayment(null)}
          onCreate={handleNewPotSubmit}
        />
      )}

      {transactionForPot && (() => {
        const pot = pots.find(p => p.id === transactionForPot.potId);
        if (!pot) return null;
        return (
          <PotTransactionModal
            theme={theme}
            cur={cur}
            pot={pot}
            direction={transactionForPot.direction}
            onCancel={() => setTransactionForPot(null)}
            onConfirm={(amount, note) => {
              const signed = transactionForPot.direction === 'in' ? amount : -amount;
              addPotTransaction(transactionForPot.potId, signed, note);
              setTransactionForPot(null);
            }}
          />
        );
      })()}

      {resetForPot && (() => {
        const pot = pots.find(p => p.id === resetForPot);
        if (!pot) return null;
        return (
          <PotResetModal
            theme={theme}
            cur={cur}
            pot={pot}
            onCancel={() => setResetForPot(null)}
            onResetBalance={() => { resetPot(pot.id); setResetForPot(null); }}
            onDeletePot={() => { deletePot(pot.id); setResetForPot(null); }}
          />
        );
      })()}

      {modal === 'reset' && (
        <ConfirmModal
          theme={theme}
          title="Roll over to next month?"
          body={rolloverSnapshot ? `${fmtMoney(rolloverSnapshot.total, cur)} across ${rolloverSnapshot.count} payment${rolloverSnapshot.count === 1 ? '' : 's'} will reset. Recurring ones move to their next date. One-offs drop off.` : ''}
          confirmLabel="Roll over"
          onCancel={() => setModal(null)}
          onConfirm={confirmReset}
        />
      )}

      {modal === 'summary' && rolloverSnapshot && (
        <SummaryModal
          theme={theme}
          cur={cur}
          snapshot={rolloverSnapshot}
          onClose={() => { setModal(null); setRolloverSnapshot(null); }}
        />
      )}
    </div>
  );
}

function Hero({ theme, totalLeft, totalPaid, progressPct, paidCount, totalCount, allPaid, pots, filter, cur }) {
  const isPotsView = filter === 'pots';
  const potsTotal = pots.reduce((s, p) => s + Number(p.balance || 0), 0);

  const mainLabel = isPotsView
    ? 'Saved across your pots'
    : (allPaid ? "You're all set" : 'Left to pay');
  const mainValue = isPotsView ? potsTotal : totalLeft;
  const mainColor = isPotsView
    ? theme.accent
    : (allPaid ? theme.green : theme.text);

  return (
    <div style={{
      background: theme.surface,
      border: `1px solid ${theme.border}`,
      borderRadius: 24,
      padding: '28px 26px 24px',
      marginBottom: 24,
      boxShadow: theme.shadow,
      transition: 'background 0.4s ease'
    }}>
      <div style={{ fontSize: 13, color: theme.textMuted, letterSpacing: '0.02em', marginBottom: 8 }}>
        {mainLabel}
      </div>
      <div style={{
        fontFamily: "'Fraunces', Georgia, serif",
        fontSize: 56, fontWeight: 400, lineHeight: 1,
        letterSpacing: '-0.03em',
        color: mainColor,
        marginBottom: isPotsView ? 4 : 20,
        fontFeatureSettings: '"tnum"'
      }}>
        {fmtMoney(mainValue, cur)}
      </div>

      {isPotsView ? (
        <div style={{ fontSize: 13, color: theme.textMuted, lineHeight: 1.5 }}>
          {pots.length === 0
            ? "Create a pot below to start tracking money set aside."
            : `Across ${pots.length} pot${pots.length === 1 ? '' : 's'}. Add or take out as you need.`
          }
        </div>
      ) : (
        <>
          <div style={{
            height: 6, background: theme.divider, borderRadius: 999,
            overflow: 'hidden', marginBottom: 14
          }}>
            <div style={{
              width: `${progressPct}%`, height: '100%',
              background: allPaid ? theme.green : theme.accent,
              borderRadius: 999,
              transition: 'width 0.6s cubic-bezier(0.22, 1, 0.36, 1), background 0.4s ease'
            }} />
          </div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 13 }}>
            <span style={{ color: theme.textMuted }}>
              Paid <span style={{ color: theme.text, fontWeight: 500 }}>{fmtMoney(totalPaid, cur)}</span>
            </span>
            <span style={{ color: theme.textFaint }}>
              {paidCount} of {totalCount}
            </span>
          </div>
        </>
      )}

}

    { key: 'all', label: 'All' },
    { key: 'recurring', label: 'Recurring' },
    { key: 'one-off', label: 'One-off' }
  ];
  if (showPots) tabs.push({ key: 'pots', label: 'Pots' });
  return (
    <div style={{
      display: 'flex', gap: 4, padding: 4,
      background: theme.surface, border: `1px solid ${theme.border}`,
      borderRadius: 14, marginBottom: 20
    }}>
      {tabs.map(t => (
        <button key={t.key} onClick={() => onChange(t.key)} style={{
          flex: 1, padding: '9px 10px',
          background: value === t.key ? theme.accentSoft : 'transparent',
          color: value === t.key ? theme.text : theme.textMuted,
          border: 'none', borderRadius: 10,
          fontSize: 13, fontWeight: 500, fontFamily: 'inherit',
          cursor: 'pointer', transition: 'all 0.2s ease',
          letterSpacing: '0.01em'

        fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',

function PotLedger({ pot, theme, cur, onRename, onDelete, onReset, onAdd, onRemove, onDeleteTx }) {
  const c = getPotColor(pot.color);
  const [editing, setEditing] = useState(false);
  const [name, setName] = useState(pot.name);
  const [showAll, setShowAll] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);

  const balance = Number(pot.balance || 0);
  const txs = pot.transactions || [];
  const visibleTxs = showAll ? txs : txs.slice(0, 4);

  const commitRename = () => {
    if (name.trim() && name.trim() !== pot.name) onRename(name.trim());
    else setName(pot.name);
    setEditing(false);
  };

  return (
    <div style={{
      background: theme.surface, border: `1px solid ${theme.border}`,
      borderRadius: 20, padding: '18px 18px 16px',
      boxShadow: theme.shadow
    }}>
      {/* Header: coloured dot, name, delete */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12
      }}>
        <span style={{
          width: 14, height: 14, borderRadius: 7, background: c.hex, flexShrink: 0
        }} />
        <div style={{ flex: 1, minWidth: 0 }}>
          {editing ? (
            <input
              value={name}
              onChange={e => setName(e.target.value)}
              onBlur={commitRename}
              onKeyDown={e => {
                if (e.key === 'Enter') commitRename();
                if (e.key === 'Escape') { setName(pot.name); setEditing(false); }
              }}
              autoFocus
              style={{
                width: '100%', background: 'transparent', border: 'none',
                fontFamily: "'Fraunces', serif", fontStyle: 'italic',
                fontSize: 19, letterSpacing: '-0.01em',
                color: theme.text, outline: 'none', padding: 0
              }}
            />
          ) : (
            <div
              onClick={() => setEditing(true)}
              style={{
                fontFamily: "'Fraunces', serif", fontStyle: 'italic',
                fontSize: 19, letterSpacing: '-0.01em',
                color: theme.text, cursor: 'text',
                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
              }}
            >{pot.name}</div>
          )}
        </div>
        <button
          onClick={() => setConfirmDel(true)}
          aria-label={`Delete ${pot.name}`}
          style={{
            background: 'transparent', border: 'none',
            color: theme.textFaint, fontSize: 12, cursor: 'pointer',
            fontFamily: 'inherit', padding: '4px 8px'
          }}
        >Delete</button>
      </div>

      {/* Balance */}
      <div style={{
        fontFamily: "'Fraunces', Georgia, serif",
        fontSize: 38, fontWeight: 400, lineHeight: 1,
        letterSpacing: '-0.02em',
        color: balance < 0 ? theme.red : theme.text,
        fontFeatureSettings: '"tnum"',
        marginBottom: 16
      }}>
        {fmtMoney(balance, cur)}
      </div>

      {/* Action buttons */}
      <div style={{ display: 'flex', gap: 8, marginBottom: txs.length > 0 ? 16 : 4 }}>
        <button onClick={onAdd} style={{
          flex: 1, padding: '11px 14px',
          background: c.soft, color: theme.text,
          border: `1px solid ${c.hex}33`, borderRadius: 12,
          fontSize: 14, fontWeight: 500, fontFamily: 'inherit',
          cursor: 'pointer', transition: 'all 0.2s ease',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6
        }}>
          <span style={{ fontSize: 16, lineHeight: 1 }}>+</span>
          Add
        </button>
        <button onClick={onRemove} style={{
          flex: 1, padding: '11px 14px',
          background: 'transparent', color: theme.textMuted,
          border: `1px solid ${theme.border}`, borderRadius: 12,
          fontSize: 14, fontWeight: 500, fontFamily: 'inherit',
          cursor: 'pointer', transition: 'all 0.2s ease',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6
        }}>
          <span style={{ fontSize: 16, lineHeight: 1 }}>−</span>
          Take out
        </button>
      </div>

      {/* Transactions list */}
      {txs.length > 0 && (
        <div style={{
          paddingTop: 12, borderTop: `1px solid ${theme.divider}`
        }}>
          <div style={{
            fontSize: 10, fontWeight: 600, letterSpacing: '0.12em',
            textTransform: 'uppercase', color: theme.textFaint,
            marginBottom: 8, paddingLeft: 2
          }}>
            Recent activity
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            {visibleTxs.map(tx => {
              const isIn = tx.amount >= 0;
              const d = new Date(tx.date + 'T00:00:00');
              const dateLabel = d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
              return (
                <div key={tx.id} style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '8px 4px'
                }}>
                  <span style={{
                    fontFamily: "'Fraunces', serif",
                    fontFeatureSettings: '"tnum"',
                    fontSize: 15, color: isIn ? theme.green : theme.text,
                    fontWeight: 500, flexShrink: 0, minWidth: 70
                  }}>
                    {isIn ? '+' : '−'}{fmtMoney(Math.abs(tx.amount), cur)}
                  </span>
                  <div style={{
                    flex: 1, minWidth: 0, fontSize: 13,
                    color: tx.note ? theme.text : theme.textFaint,
                    whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'
                  }}>
                    {tx.note || (isIn ? 'Added' : 'Taken out')}
                  </div>
                  <span style={{ fontSize: 11, color: theme.textFaint, flexShrink: 0 }}>
                    {dateLabel}
                  </span>
                  <button
                    onClick={() => onDeleteTx(tx.id)}
                    aria-label="Remove this entry"
                    style={{
                      background: 'transparent', border: 'none',
                      color: theme.textFaint, fontSize: 14, cursor: 'pointer',
                      padding: '2px 6px', fontFamily: 'inherit',
                      lineHeight: 1
                    }}
                  >×</button>
                </div>
              );
            })}
          </div>
          {txs.length > 4 && (
            <button onClick={() => setShowAll(!showAll)} style={{
              marginTop: 8, width: '100%', padding: '8px',
              background: 'transparent', border: 'none',
              fontSize: 12, color: theme.textMuted,
              fontFamily: 'inherit', cursor: 'pointer', letterSpacing: '0.02em'
            }}>
              {showAll ? 'Show less' : `Show all ${txs.length} entries`}
            </button>
          )}
          <button onClick={onReset} style={{
            marginTop: 8, width: '100%', padding: '10px',
            background: 'transparent', border: `1px solid ${theme.border}`,
            borderRadius: 10, fontSize: 12, color: theme.textMuted,
            fontFamily: 'inherit', cursor: 'pointer', letterSpacing: '0.02em'
          }}>Reset pot</button>
        </div>
      )}

      {confirmDel && (
        <ConfirmModal
          theme={theme}
          title={`Delete ‘${pot.name}’?`}
          body="This will remove the pot and its history. This can't be undone."
          confirmLabel="Delete pot"
          onCancel={() => setConfirmDel(false)}
          onConfirm={() => { setConfirmDel(false); onDelete(); }}
        />
      )}
    </div>
  );
}


function PaymentRow({ p, theme, cur, onToggle, onEdit, onDelete }) {
  const status = getStatus(p);
  const [swipe, setSwipe] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const touchRef = useRef({ x: 0, y: 0, moved: false, active: false });

  const statusColor = {
    paid: theme.green, overdue: theme.red,
    soon: theme.amber, upcoming: theme.textMuted
  }[status];

  const statusBg = {
    paid: theme.greenSoft, overdue: theme.redSoft,
    soon: theme.amberSoft, upcoming: 'transparent'
  }[status];

  const onTouchStart = (e) => {
    touchRef.current = {
      x: e.touches[0].clientX, y: e.touches[0].clientY, moved: false, active: true
    };
  };
  const onTouchMove = (e) => {
    if (!touchRef.current.active) return;
    const dx = e.touches[0].clientX - touchRef.current.x;
    const dy = e.touches[0].clientY - touchRef.current.y;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      touchRef.current.moved = true;
      setSwipe(Math.max(-100, Math.min(10, dx)));
    }
  };
  const onTouchEnd = () => {
    if (touchRef.current.moved && swipe <= -60) {
      setRevealed(true);
      setSwipe(-80);
    } else {
      setRevealed(false);
      setSwipe(0);
    }
    touchRef.current.active = false;
  };

  const handleRowClick = () => {
    if (revealed) { setRevealed(false); setSwipe(0); return; }
    if (touchRef.current.moved) { touchRef.current.moved = false; return; }
    onEdit();
  };

  return (
    <div style={{ position: 'relative', borderRadius: 16, overflow: 'hidden' }}>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
        paddingRight: 20, background: theme.redSoft, borderRadius: 16
      }}>
        <button onClick={(e) => { e.stopPropagation(); onDelete(); }} style={{
          background: 'transparent', color: theme.red, border: 'none',
          fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
          padding: '8px 4px'
        }}>Delete</button>
      </div>

      <div
        onClick={handleRowClick}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{
          position: 'relative',
          background: theme.surface,
          border: `1px solid ${theme.border}`,
          borderRadius: 16,
          padding: '14px 16px',
          display: 'flex', alignItems: 'center', gap: 14,
          cursor: 'pointer',
          transform: `translateX(${swipe}px)`,
          transition: touchRef.current.active ? 'none' : 'transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease',
          opacity: p.paid ? 0.72 : 1,
          touchAction: 'pan-y'
        }}>
        <button
          onClick={(e) => { e.stopPropagation(); onToggle(); }}
          aria-label={p.paid ? 'Mark unpaid' : 'Mark paid'}
          style={{
            flexShrink: 0, width: 28, height: 28, borderRadius: 14,
            border: `1.5px solid ${p.paid ? theme.green : theme.border}`,
            background: p.paid ? theme.green : 'transparent',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', transition: 'all 0.2s ease', padding: 0
          }}>
          {p.paid && <CheckIcon color={theme.bg} />}
        </button>

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontSize: 15, fontWeight: 500, color: theme.text,
            textDecoration: p.paid ? 'line-through' : 'none',

          }}>{p.name}</div>
          <div style={{ fontSize: 12, color: theme.textMuted, display: 'flex', gap: 6, alignItems: 'center' }}>
            <span>{friendlyDate(p.dueDate)}</span>
            {p.recurrence !== 'one-off' && (
              <>
                <span style={{ color: theme.textFaint }}>·</span>
                <span>{recurrenceLabel(p)}</span>
              </>
            )}
            {p.notes && (
              <>
                <span style={{ color: theme.textFaint }}>·</span>
                <span style={{
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 100
                }}>{p.notes}</span>
              </>
            )}
          </div>
        </div>

        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{
            fontFamily: "'Fraunces', serif", fontSize: 18,
            fontFeatureSettings: '"tnum"',
            color: theme.text,
            textDecoration: p.paid ? 'line-through' : 'none',
            textDecorationColor: theme.textFaint
          }}>{fmtMoney(p.amount, cur)}</div>
          {status !== 'upcoming' && (
            <div style={{
              display: 'inline-block', marginTop: 4,
              fontSize: 10, fontWeight: 600, letterSpacing: '0.06em',
              textTransform: 'uppercase', color: statusColor,
              padding: '2px 8px', background: statusBg, borderRadius: 999
            }}>
              {status === 'paid' ? 'Paid' : status === 'overdue' ? 'Overdue' : 'Due soon'}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- Modals ----------

function ModalShell({ theme, children, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 100,
      background: 'rgba(0,0,0,0.5)',
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      animation: 'tallyFadeIn 0.2s ease'
    }} onClick={onClose}>
      <style>{`
        @keyframes tallyFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes tallySlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      `}</style>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: theme.surface, width: '100%', maxWidth: 520,
        borderRadius: '24px 24px 0 0',
        borderTop: `1px solid ${theme.border}`,
        maxHeight: '92vh', overflow: 'auto',
        animation: 'tallySlideUp 0.3s cubic-bezier(0.22,1,0.36,1)',
        color: theme.text
      }}>
        {children}
      </div>
    </div>
  );
}

function PaymentModal({ theme, cur, editing, skipNonWorking, onCancel, onSave, onDelete }) {
  const [name, setName] = useState(editing?.name || '');
  const [amount, setAmount] = useState(editing?.amount?.toString() || '');
  const [dueDate, setDueDate] = useState(editing?.dueDate || todayISO());
  const [recurrence, setRecurrence] = useState(editing?.recurrence || 'monthly');
  const [customDay, setCustomDay] = useState(editing?.customDay || new Date().getDate());
  const [notes, setNotes] = useState(editing?.notes || '');

  const canSave = name.trim() && amount && dueDate;

  const handleSave = () => {
    if (!canSave) return;
    onSave({
      name: name.trim(),
      amount: parseFloat(amount),
      dueDate,
      recurrence,
      customDay: recurrence === 'custom' ? Number(customDay) : undefined,
      notes: notes.trim()
    });
  };

  return (
    <ModalShell theme={theme} onClose={onCancel}>
      <div style={{ padding: '24px 24px 32px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{
            fontFamily: "'Fraunces', serif", fontWeight: 400, fontStyle: 'italic',
            fontSize: 24, margin: 0, letterSpacing: '-0.01em'
          }}>{editing ? 'Edit payment' : 'New payment'}</h2>
          <button onClick={onCancel} aria-label="Close" style={iconBtn(theme)}><CloseIcon /></button>
        </div>

        <Field theme={theme} label="Name">
          <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Gym, Rent, Netflix"
            style={inputStyle(theme)} autoFocus />
        </Field>

        <Field theme={theme} label="Amount">
          <div style={{ position: 'relative' }}>
            <span style={{
              position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)',
              color: theme.textMuted, fontSize: 16, fontFamily: "'Fraunces', serif"
            }}>{cur}</span>
            <input type="number" step="0.01" inputMode="decimal" value={amount}
              onChange={e => setAmount(e.target.value)} placeholder="0.00"
              style={{ ...inputStyle(theme), paddingLeft: 34, fontFamily: "'Fraunces', serif", fontSize: 18 }} />
          </div>
        </Field>

        <Field theme={theme} label="Due date">
          <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
            style={inputStyle(theme)} />
          {skipNonWorking && dueDate && !isWorkingDay(dueDate) && (() => {
            const shifted = adjustToWorkingDay(dueDate);
            const d = new Date(dueDate + 'T00:00:00');
            const dow = d.getDay();
            const reason = BANK_HOLIDAYS.has(dueDate)
              ? 'a bank holiday'
              : (dow === 0 ? 'a Sunday' : 'a Saturday');
            const shiftedDate = new Date(shifted + 'T00:00:00');
            const shiftedLabel = shiftedDate.toLocaleDateString(undefined, {
              weekday: 'long', day: 'numeric', month: 'short'
            });
            return (
              <div style={{
                marginTop: 8, padding: '10px 12px',
                background: theme.accentSoft, border: `1px solid ${theme.border}`,
                borderRadius: 10, fontSize: 12, color: theme.textMuted, lineHeight: 1.5
              }}>
                That's {reason}. On rollover it'll move to{' '}
                <span style={{ color: theme.text, fontWeight: 500 }}>{shiftedLabel}</span>.
              </div>
            );
          })()}
        </Field>

        <Field theme={theme} label="Repeats">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
            {RECURRENCE_OPTIONS.map(o => (
              <button key={o.value} onClick={() => setRecurrence(o.value)} style={{
                padding: '11px 12px',
                background: recurrence === o.value ? theme.accentSoft : 'transparent',
                color: recurrence === o.value ? theme.text : theme.textMuted,
                border: `1px solid ${recurrence === o.value ? theme.accent : theme.border}`,
                borderRadius: 10, fontSize: 13, fontWeight: 500, fontFamily: 'inherit',
                cursor: 'pointer', textAlign: 'left', transition: 'all 0.2s ease'
              }}>{o.label}</button>
            ))}
          </div>
        </Field>

        {recurrence === 'custom' && (
          <Field theme={theme} label="Day of month">
            <input type="number" min="1" max="31" value={customDay}
              onChange={e => setCustomDay(Math.max(1, Math.min(31, Number(e.target.value))))}
              style={inputStyle(theme)} />
          </Field>
        )}



        <Field theme={theme} label="Notes (optional)">
          <textarea value={notes} onChange={e => setNotes(e.target.value)}
            placeholder="Account number, reference, anything you want to remember"
            rows={2} style={{ ...inputStyle(theme), resize: 'vertical', minHeight: 60 }} />
        </Field>

        <div style={{ display: 'flex', gap: 10, marginTop: 24 }}>
          {editing && onDelete && (
            <button onClick={onDelete} style={{
              padding: '13px 18px', background: 'transparent', color: theme.red,
              border: `1px solid ${theme.border}`, borderRadius: 12,
              fontSize: 14, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer'
            }}>Delete</button>
          )}
          <button onClick={handleSave} disabled={!canSave} style={{
            flex: 1, padding: '13px 18px',
            background: canSave ? theme.accent : theme.accentSoft,
            color: canSave ? theme.bg : theme.textFaint,
            border: 'none', borderRadius: 12,
            fontSize: 14, fontWeight: 600, fontFamily: 'inherit',
            cursor: canSave ? 'pointer' : 'not-allowed',
            letterSpacing: '0.01em', transition: 'all 0.2s ease'
          }}>{editing ? 'Save changes' : 'Add payment'}</button>
        </div>
      </div>
    </ModalShell>
  );
}

function SettingsModal({ theme, themeName, onSelectTheme, currency, onSelectCurrency, skipNonWorking, onToggleSkipNonWorking, potsEnabled, onTogglePotsEnabled, pots, cur, onRenamePot, onDeletePot, onClose }) {
  const [pendingDelete, setPendingDelete] = useState(null);
  const [renamingId, setRenamingId] = useState(null);
  const [renameValue, setRenameValue] = useState('');

  const startRename = (pot) => { setRenamingId(pot.id); setRenameValue(pot.name); };
  const commitRename = () => {
    if (renamingId && renameValue.trim()) onRenamePot(renamingId, renameValue);
    setRenamingId(null);
    setRenameValue('');
  };

  return (
    <ModalShell theme={theme} onClose={onClose}>
      <div style={{ padding: '24px 24px 32px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h2 style={{
            fontFamily: "'Fraunces', serif", fontWeight: 400, fontStyle: 'italic',
            fontSize: 24, margin: 0, letterSpacing: '-0.01em'
          }}>Settings</h2>
          <button onClick={onClose} aria-label="Close" style={iconBtn(theme)}><CloseIcon /></button>
        </div>

        <div style={{
          fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
          textTransform: 'uppercase', color: theme.textMuted, marginBottom: 12
        }}>Theme</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 28 }}>
          {Object.entries(THEMES).map(([key, t]) => (
            <button key={key} onClick={() => onSelectTheme(key)} style={{
              padding: '14px 14px', textAlign: 'left',
              background: t.surface, color: t.text,
              border: `2px solid ${themeName === key ? theme.accent : t.border}`,
              borderRadius: 14, cursor: 'pointer', fontFamily: 'inherit',
              transition: 'all 0.2s ease',
              display: 'flex', alignItems: 'center', gap: 10
            }}>
              <div style={{
                width: 20, height: 20, borderRadius: 10,
                background: t.accent, boxShadow: `inset 0 0 0 3px ${t.surface}, inset 0 0 0 4px ${t.border}`
              }} />
              <span style={{ fontSize: 14, fontWeight: 500 }}>{t.name}</span>
            </button>
          ))}
        </div>

        <div style={{
          fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
          textTransform: 'uppercase', color: theme.textMuted, marginBottom: 12
        }}>Currency</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 24 }}>
          {Object.entries(CURRENCIES).map(([code, sym]) => (
            <button key={code} onClick={() => onSelectCurrency(code)} style={{
              padding: '11px 8px',
              background: currency === code ? theme.accentSoft : 'transparent',
              color: currency === code ? theme.text : theme.textMuted,
              border: `1px solid ${currency === code ? theme.accent : theme.border}`,
              borderRadius: 10, fontSize: 13, fontWeight: 500, fontFamily: 'inherit',
              cursor: 'pointer', transition: 'all 0.2s ease'
            }}>
              <span style={{ fontFamily: "'Fraunces', serif", fontSize: 15, marginRight: 4 }}>{sym}</span>
              {code}
            </button>
          ))}
        </div>

        <div style={{
          fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
          textTransform: 'uppercase', color: theme.textMuted, marginBottom: 12
        }}>Dates</div>
        <ToggleRow
          theme={theme}
          label="Skip weekends & bank holidays"
          sublabel="Rolls payments to the next working day (UK)"
          value={skipNonWorking}
          onChange={onToggleSkipNonWorking}
        />

        <div style={{
          fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
          textTransform: 'uppercase', color: theme.textMuted, marginBottom: 12, marginTop: 24
        }}>Pots</div>
        <ToggleRow
          theme={theme}
          label="Use pots"
          sublabel="Little savings ledgers — add or take out as you go"
          value={potsEnabled}
          onChange={onTogglePotsEnabled}
        />

        {potsEnabled && pots.length > 0 && (
          <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {pots.map(pot => {
              const c = getPotColor(pot.color);
              const isRenaming = renamingId === pot.id;
              const balance = Number(pot.balance || 0);
              const txCount = (pot.transactions || []).length;
              return (
                <div key={pot.id} style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '12px 14px', background: theme.surface,
                  border: `1px solid ${theme.border}`, borderRadius: 12
                }}>
                  <span style={{
                    width: 12, height: 12, borderRadius: 6, background: c.hex, flexShrink: 0
                  }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    {isRenaming ? (
                      <input
                        value={renameValue}
                        onChange={e => setRenameValue(e.target.value)}
                        onBlur={commitRename}
                        onKeyDown={e => {
                          if (e.key === 'Enter') commitRename();
                          if (e.key === 'Escape') { setRenamingId(null); setRenameValue(''); }
                        }}
                        autoFocus
                        style={{
                          width: '100%', background: 'transparent', border: 'none',
                          fontSize: 14, fontFamily: 'inherit', color: theme.text, outline: 'none', padding: 0
                        }}
                      />
                    ) : (
                      <>
                        <div
                          onClick={() => startRename(pot)}
                          style={{
                            fontSize: 14, color: theme.text, cursor: 'pointer',
                            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                            fontWeight: 500
                          }}
                        >{pot.name}</div>
                        <div style={{
                          fontSize: 12, color: theme.textMuted, marginTop: 2,
                          display: 'flex', alignItems: 'center', gap: 6
                        }}>
                          <span style={{ fontFamily: "'Fraunces', serif", fontStyle: 'italic', fontFeatureSettings: '"tnum"' }}>
                            {fmtMoney(balance, cur)}
                          </span>
                          <span style={{ color: theme.textFaint }}>·</span>
                          <span>{txCount} {txCount === 1 ? 'entry' : 'entries'}</span>
                        </div>
                      </>
                    )}
                  </div>
                  <button
                    onClick={() => setPendingDelete(pot)}
                    aria-label={`Delete ${pot.name}`}
                    style={{
                      background: 'transparent', border: 'none',
                      color: theme.textFaint, fontSize: 12, cursor: 'pointer',
                      fontFamily: 'inherit', padding: '4px 8px', alignSelf: 'flex-start'
                    }}
                  >Delete</button>
                </div>
              );
            })}
          </div>
        )}

        {potsEnabled && pots.length === 0 && (
          <div style={{
            marginTop: 12, padding: '14px 16px',
            background: theme.accentSoft, border: `1px solid ${theme.border}`,
            borderRadius: 12, fontSize: 12, color: theme.textMuted, lineHeight: 1.5
          }}>
            You've no pots yet. Pop over to the Pots tab to create your first one.
          </div>
        )}

        <div style={{
          marginTop: 28, paddingTop: 20, borderTop: `1px solid ${theme.divider}`,
          fontSize: 12, color: theme.textFaint, textAlign: 'center', lineHeight: 1.6
        }}>
          Tally · a calm little app for your monthly payments<br/>
          <span style={{ fontFamily: "'Fraunces', serif", fontStyle: 'italic' }}>Little App Studio</span>
        </div>
      </div>

      {pendingDelete && (
        <ConfirmModal
          theme={theme}
          title={`Delete ‘${pendingDelete.name}’?`}
          body="Any payments in this pot will go back to outstanding. This can't be undone."
          confirmLabel="Delete pot"
          onCancel={() => setPendingDelete(null)}
          onConfirm={() => { onDeletePot(pendingDelete.id); setPendingDelete(null); }}
        />
      )}
    </ModalShell>
  );
}

function NewPotModal({ theme, nextColor, onCancel, onCreate }) {
  const [name, setName] = useState('');
  const canSave = name.trim().length > 0;
  const submit = () => { if (canSave) onCreate(name); };
  return (
    <ModalShell theme={theme} onClose={onCancel}>
      <div style={{ padding: '24px 24px 28px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
          <h2 style={{
            fontFamily: "'Fraunces', serif", fontWeight: 400, fontStyle: 'italic',
            fontSize: 22, margin: 0, letterSpacing: '-0.01em'
          }}>New pot</h2>
          <button onClick={onCancel} aria-label="Close" style={iconBtn(theme)}><CloseIcon /></button>
        </div>
        <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 18 }}>
          Name the pot where this money is set aside.
        </div>

        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: '12px 14px', background: theme.surface,
          border: `1px solid ${theme.border}`, borderRadius: 12, marginBottom: 14
        }}>
          <span style={{
            width: 14, height: 14, borderRadius: 7, background: nextColor.hex, flexShrink: 0
          }} />
          <input
            value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }}
            placeholder="e.g. Bills, Rent, Subscriptions"
            autoFocus
            style={{
              flex: 1, background: 'transparent', border: 'none',
              fontSize: 15, fontFamily: 'inherit', color: theme.text, outline: 'none'
            }}
          />
        </div>
        <div style={{ fontSize: 11, color: theme.textFaint, marginBottom: 20, textAlign: 'center' }}>
          Colour chosen for you — keeps things calm.
        </div>

        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onCancel} style={{
            flex: 1, padding: '13px 18px',
            background: 'transparent', color: theme.textMuted,
            border: `1px solid ${theme.border}`, borderRadius: 12,
            fontSize: 14, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer'
          }}>Cancel</button>
          <button onClick={submit} disabled={!canSave} style={{
            flex: 1, padding: '13px 18px',
            background: canSave ? theme.accent : theme.border,
            color: canSave ? theme.bg : theme.textFaint,
            border: 'none', borderRadius: 12,
            fontSize: 14, fontWeight: 600, fontFamily: 'inherit',
            cursor: canSave ? 'pointer' : 'not-allowed',
            transition: 'all 0.2s ease'
          }}>Create pot</button>
        </div>
      </div>
    </ModalShell>
  );
}

function ConfirmModal({ theme, title, body, confirmLabel, onCancel, onConfirm }) {
  return (
    <ModalShell theme={theme} onClose={onCancel}>
      <div style={{ padding: '28px 24px 24px' }}>
        <h2 style={{
          fontFamily: "'Fraunces', serif", fontWeight: 400, fontStyle: 'italic',
          fontSize: 24, margin: '0 0 10px', letterSpacing: '-0.01em'
        }}>{title}</h2>
        <p style={{ fontSize: 14, color: theme.textMuted, lineHeight: 1.6, margin: '0 0 24px' }}>{body}</p>
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onCancel} style={{
            flex: 1, padding: '13px 18px', background: 'transparent', color: theme.textMuted,
            border: `1px solid ${theme.border}`, borderRadius: 12,
            fontSize: 14, fontWeight: 500, fontFamily: 'inherit', cursor: 'pointer'
          }}>Not yet</button>
          <button onClick={onConfirm} style={{
            flex: 1, padding: '13px 18px', background: theme.accent, color: theme.bg,
            border: 'none', borderRadius: 12,
            fontSize: 14, fontWeight: 600, fontFamily: 'inherit', cursor: 'pointer'
          }}>{confirmLabel}</button>
        </div>
      </div>
    </ModalShell>
  );
}

function SummaryModal({ theme, cur, snapshot, onClose }) {
  return (
    <ModalShell theme={theme} onClose={onClose}>
      <div style={{ padding: '36px 24px 28px', textAlign: 'center' }}>
        <div style={{ fontSize: 13, color: theme.textMuted, letterSpacing: '0.04em', marginBottom: 10 }}>
          This month, you sorted
        </div>
        <div style={{
          fontFamily: "'Fraunces', serif", fontStyle: 'italic',
          fontSize: 52, fontWeight: 400, lineHeight: 1,
          letterSpacing: '-0.02em', color: theme.green, marginBottom: 14,
          fontFeatureSettings: '"tnum"'
        }}>{fmtMoney(snapshot.total, cur)}</div>
        <div style={{ fontSize: 15, color: theme.textMuted, marginBottom: 28 }}>
          across {snapshot.count} payment{snapshot.count === 1 ? '' : 's'}
        </div>
        <div style={{
          fontFamily: "'Fraunces', serif", fontStyle: 'italic',
          fontSize: 18, color: theme.text, marginBottom: 24
        }}>Nice one. You've got this.</div>
        <button onClick={onClose} style={{
          width: '100%', padding: '13px 18px',
          background: theme.accent, color: theme.bg, border: 'none', borderRadius: 12,
          fontSize: 14, fontWeight: 600, fontFamily: 'inherit', cursor: 'pointer',
          letterSpacing: '0.01em'
        }}>Onwards</button>
      </div>
    </ModalShell>
  );
}
